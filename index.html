<!DOCTYPE html>

        ::-webkit-scrollbar-thumb {
            background: #262626;
            border-radius: 0px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #404040;
        }

        @keyframes pulse-slow {

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">

            <h1 id="pitch-title" class="text-5xl md:text-8xl font-black tracking-tighter uppercase leading-none text-white"></h1>
            <p id="pitch-tagline" class="text-neutral-400 text-sm md:text-lg max-w-2xl leading-relaxed font-bold"></p>
        </header>

        <!-- Dynamic API Alerts -->
        <div id="error-alert" class="hidden mb-8 p-6 rounded-none border-l-4 border-rose-500 bg-neutral-900 text-neutral-200 text-sm flex items-start space-x-4 max-w-3xl mx-auto">

                    </div>

                </div>

                </div>
            </section>

            <!-- SIDEBAR HISTORY SECTION (4 COLUMNS) -->
            <aside class="lg:col-span-4 bg-neutral-900 border border-neutral-800 p-6 space-y-6 font-sans">
                <div class="flex items-center justify-between border-b border-neutral-800 pb-3">

                <div id="history-list-box" class="space-y-2.5 max-h-[350px] overflow-y-auto pr-1"></div>

                <div class="pt-4 border-t border-neutral-800 text-xs text-neutral-400 leading-relaxed bg-neutral-950 p-4 border border-neutral-800">

        </main>

            <div class="flex flex-wrap gap-6 justify-center items-center">

                EinfachErklärt.AI v.2.4 (Standalone)
            </div>
        </div>

                    state.history = JSON.parse(cached);
                } catch (e) {
                    console.error("Failed to restore history log", e);
                }
            }
            // Bind default inputs
            document.getElementById('search-input').value = state.keyword;
            renderAll();
        });

        // Toggle app-wide language setup
        function setLanguage(selectedLang) {
            state.lang = selectedLang;
            state.errorChat = null;
            state.questionError = null;
            renderAll();
        }

        // Change current display simplification stage
        function setLevel(lvl) {
            state.currentLevel = parseInt(lvl);
            renderAll();
        }

        // Clean user interface views and search bars back to initial screen
        function resetView() {
            state.currentExplanation = null;
            state.errorChat = null;
            state.keyword = '';
            document.getElementById('search-input').value = '';
            
            // Clear QA replies too
            state.customQuestion = '';
            state.activeQuestion = null;
            state.questionAnswer = null;
            state.questionError = null;
            
            renderAll();
        }

        // Search trigger process using standard local API calls
       async function triggerSearch() {
    const inputVal = document.getElementById('search-input').value;
    if (!inputVal || inputVal.trim() === '') return;

    state.keyword = inputVal.trim();
    state.isLoading = true;
    state.errorChat = null;
    renderAll();

    state.loadingStepIndex = 0;
    updateLoadingStepText();
    if (loadingInterval) clearInterval(loadingInterval);
    loadingInterval = setInterval(() => {
        state.loadingStepIndex = (state.loadingStepIndex + 1) % LOADING_STEPS[state.lang].length;
        updateLoadingStepText();
    }, 1800);

    try {
        const response = await fetch("/.netlify/functions/gemini", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: `Erkläre ${state.keyword} in 3 Stufen: 1. Einfach, 2. Noch einfacher, 3. Mit einer Analogie.` }),
        });

       const data = await response.json();
        
        // Extrahiere den Text aus der Gemini-Antwortstruktur
        const rawText = data.candidates[0].content.parts[0].text;
        
        // Jetzt verarbeitest du rawText weiter
        state.currentExplanation = rawText; 
        state.isLoading = false;
        clearInterval(loadingInterval);
        
        state.history.unshift(state.keyword);
        localStorage.setItem('simplifier_history', JSON.stringify(state.history));
        
        renderAll();
    } catch (err) {
        state.isLoading = false;
        clearInterval(loadingInterval);
        state.errorChat = err.message;
        renderAll();
            }
        }

        // Interactive follow-up query submission
        async function submitQAQuestion(questionText) {
            if (!questionText || questionText.trim() === '' || !state.currentExplanation) return;
            
            state.isAskingQuestion = true;
            state.questionError = null;
            state.activeQuestion = questionText.trim();
            state.questionAnswer = null; // reset preceding answer
            renderAll();

            try {
                const response = await fetch("/api/ask", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        topic: state.currentExplanation.topic,
                        question: questionText.trim(),
                        lang: state.lang
                    }),
                });

                const data = await response.json();
                if (!response.ok || !data.success) {
                    throw new Error(data.error || (state.lang === 'en' ? "Failed to get an answer." : "Antwort konnte nicht geladen werden."));
                }

                state.questionAnswer = data.answer;
                state.customQuestion = '';
                document.getElementById('qa-custom-input').value = '';
            } catch (err) {
                console.error(err);
                state.questionError = err.message || (state.lang === 'en' ? "Error getting an answer." : "Fehler beim Laden der Antwort.");
            } finally {
                state.isAskingQuestion = false;
                renderAll();
            }
        }

        // Trigger manual free-form questions from input bar
        function submitCustomQuestion() {
            const val = document.getElementById('qa-custom-input').value;
            if (!val || val.trim() === '') return;
            submitQAQuestion(val);
        }

        // Restore explanation details directly from previous local history
        function loadItemFromHistory(itemId) {
            const item = state.history.find(h => h.id === itemId);
            if (!item) return;

            state.currentExplanation = item.explanations;
            state.currentLevel = 1;
            state.errorChat = null;

            state.customQuestion = '';
            const qaInput = document.getElementById('qa-custom-input');
            if (qaInput) qaInput.value = '';
            state.activeQuestion = null;
            state.questionAnswer = null;
            state.questionError = null;

            renderAll();
        }

        // Safely remove unique item node from the sidebar log
        function deleteHistoryItem(id, event) {
            if (event) event.stopPropagation();
            state.history = state.history.filter(h => h.id !== id);
            localStorage.setItem('simplifier_history', JSON.stringify(state.history));
            renderAll();
        }

        // Empty search history
        function clearSearchHistory() {
            state.history = [];
            localStorage.setItem('simplifier_history', JSON.stringify([]));
            renderAll();
        }

        // Action helper for reading keydowns
        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !state.isLoading) {
                triggerSearch();
            }
        }

        function handleQAInputKeydown(e) {
            if (e.key === 'Enter' && !state.isAskingQuestion) {
                submitCustomQuestion();
            }
        }

        // Quick rotate sub-narratives for simple feedback
        function updateLoadingStepText() {
            const el = document.getElementById('loading-step-text');
            if (el) {
                el.innerText = `⏱️ ${LOADING_STEPS[state.lang][state.loadingStepIndex]}`;
            }
        }

        // Copy explanation text directly to system clipboards
        function copyTextToClipboard() {
            if (!state.currentExplanation) return;
            let textToCopy = '';
            switch(state.currentLevel) {
                case 1: textToCopy = state.currentExplanation.level1; break;
                case 2: textToCopy = state.currentExplanation.level2; break;
                case 3: textToCopy = state.currentExplanation.level3; break;
            }

            // Replace escaped raw double string delimiters safely
            textToCopy = textToCopy.replace(/\\n/g, '\n');

            navigator.clipboard.writeText(textToCopy).then(() => {
                state.isCopied = true;
                renderCopyButton();
                setTimeout(() => {
                    state.isCopied = false;
                    renderCopyButton();
                }, 2000);
            });
        }

        function closeQAAnswer() {
            state.activeQuestion = null;
            state.questionAnswer = null;
            renderAll();
        }

        // Subrender: Copy button states specifically to avoid full re-sketches
        function renderCopyButton() {
            const btnBox = document.getElementById('btn-copy-content');
            if (!btnBox) return;

            const labelVal = TRANSLATIONS[state.lang];
            if (state.isCopied) {
                btnBox.innerHTML = `
                    <i data-lucide="check" class="w-3.5 h-3.5 text-emerald-400"></i>
                    <span class="text-emerald-400 font-extrabold">${labelVal.copied}</span>
                `;
            } else {
                btnBox.innerHTML = `
                    <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                    <span>${labelVal.copy}</span>
                `;
            }
            lucide.createIcons();
        }

        // CENTRAL PAGE RENDER ENGINE (Dynamically updates elements based on current state variables)
        function renderAll() {
            const langDict = TRANSLATIONS[state.lang];

            // 1. Language Button CSS Accent highlights
            const btnDE = document.getElementById('btn-lang-de');
            const btnEN = document.getElementById('btn-lang-en');
            if (state.lang === 'de') {
                btnDE.className = "px-3 py-1.5 font-bold uppercase transition-all whitespace-nowrap cursor-pointer bg-[#FACC15] text-black";
                btnEN.className = "px-3 py-1.5 font-bold uppercase transition-all whitespace-nowrap cursor-pointer text-neutral-400 hover:text-white";
            } else {
                btnDE.className = "px-3 py-1.5 font-bold uppercase transition-all whitespace-nowrap cursor-pointer text-neutral-400 hover:text-white";
                btnEN.className = "px-3 py-1.5 font-bold uppercase transition-all whitespace-nowrap cursor-pointer bg-[#FACC15] text-black";
            }

            // 2. Headings & Pitch Labels
            const headerBox = document.getElementById('pitch-header');
            if (!state.currentExplanation) {
                headerBox.style.display = 'flex';
                document.getElementById('pitch-subtitle').innerText = `⚡ ${langDict.upperSubtitle} ⚡`;
                
                const splitWords = langDict.upperTitle.split(" ");
                document.getElementById('pitch-title').innerHTML = `${splitWords[0]} <span class="text-[#FACC15]">${splitWords[1] || ''}</span>`;
                document.getElementById('pitch-tagline').innerText = langDict.tagline;
            } else {
                headerBox.style.display = 'none';
            }

            // 3. API Alerts logic
            const alertBox = document.getElementById('error-alert');
            if (state.errorChat) {
                alertBox.classList.remove('hidden');
                document.getElementById('error-alert-title').innerText = langDict.errorTitle;
                document.getElementById('error-alert-msg').innerText = state.errorChat;
                document.getElementById('error-alert-desc').innerText = langDict.errDescKey;
            } else {
                alertBox.classList.add('hidden');
            }

            // 4. Inputs & Search Boxes
            document.getElementById('input-label').innerText = langDict.inputLabel;
            document.getElementById('search-input').placeholder = langDict.inputPlaceholder;
            
            const btnSearch = document.getElementById('btn-search');
            btnSearch.disabled = state.isLoading;
            
            const searchTxt = document.getElementById('btn-search-text');
            if (state.isLoading) {
                searchTxt.innerHTML = `<i data-lucide="refresh-cw" class="w-4 h-4 animate-spin"></i>`;
            } else {
                searchTxt.innerText = langDict.btnSimplify;
            }

            // Popular Suggestions Tag Cloud
            document.getElementById('popular-topics-label').innerText = langDict.popularTopics;
            const popularBox = document.getElementById('popular-topics-box');
            popularBox.innerHTML = '';
            SUGGESTED_TOPICS[state.lang].forEach(topic => {
                const btn = document.createElement('button');
                btn.className = "inline-flex items-center space-x-2 px-3 py-1.5 bg-neutral-950 hover:bg-neutral-850 border border-neutral-800 text-xs font-mono font-bold text-neutral-300 hover:text-white transition-all text-left disabled:opacity-40 cursor-pointer";
                btn.onclick = () => { if (!state.isLoading) { document.getElementById('search-input').value = topic.keyword; triggerSearch(); } };
                btn.disabled = state.isLoading;
                btn.innerHTML = `<span class="opacity-90">${topic.icon}</span> <span class="font-sans">${topic.keyword}</span>`;
                popularBox.appendChild(btn);
            });

            // 5. Center display state controls: ONBOARDING, LOADING, or CONTENT EXPLANATIONS
            const loadingScreen = document.getElementById('loading-screen');
            const contentScreen = document.getElementById('explanation-view');
            const onboardingScreen = document.getElementById('onboarding-empty');

            if (state.isLoading) {
                loadingScreen.classList.remove('hidden');
                contentScreen.classList.add('hidden');
                onboardingScreen.classList.add('hidden');

                // Bind loader text
                document.getElementById('loading-title').innerText = langDict.loadingTitle;
                document.getElementById('loading-desc').innerText = state.lang === 'en'
                    ? "Our AI systematically strips down complex jargon to build mouth-sized visual levels."
                    : "Unsere KI bricht komplexe Wortstrukturen systematisch herraus, um dir mondgerechte Versionen zu erstellen.";
                
                updateLoadingStepText();
            } else if (state.currentExplanation) {
                loadingScreen.classList.add('hidden');
                contentScreen.classList.remove('hidden');
                onboardingScreen.classList.add('hidden');

                // Render explanation variables
                document.getElementById('explaining-label').innerText = langDict.explaining;
                document.getElementById('explanation-topic').innerText = state.currentExplanation.topic;
                document.getElementById('simplification-level-label').innerText = langDict.simplificationLevel;
                document.getElementById('explanation-stage-counter').innerText = `0${state.currentLevel}/03`;

                // Badge description
                const titleMetaDE = state.currentLevel === 1 ? langDict.level1Title : state.currentLevel === 2 ? langDict.level2Title : langDict.level3Title;
                document.getElementById('explanation-stage-badge').innerText = `${state.lang === 'en' ? 'STAGE' : 'STUFE'} ${state.currentLevel}: ${titleMetaDE}`;
                
                // Set text formatting with double newlines
                let rawText = '';
                if (state.currentLevel === 1) rawText = state.currentExplanation.level1;
                else if (state.currentLevel === 2) rawText = state.currentExplanation.level2;
                else if (state.currentLevel === 3) rawText = state.currentExplanation.level3;

                // Format paragraph items
                const splitParas = rawText.replace(/\\n/g, '\n').split('\n\n');
                const pBox = document.getElementById('explanation-text');
                pBox.innerHTML = '';
                splitParas.forEach(para => {
                    const cleanPara = para.trim();
                    if (cleanPara) {
                        const p = document.createElement('p');
                        p.className = "text-base md:text-lg leading-relaxed text-neutral-300 font-medium";
                        p.innerText = cleanPara;
                        pBox.appendChild(p);
                    }
                });

                // Clear Copy states
                renderCopyButton();

                // Selection Tabs styling directly inside the frame
                document.getElementById('level-selection-label').innerText = langDict.levelSelectionTitle;
                const stageDescText = state.currentLevel === 1 ? langDict.level1Desc : state.currentLevel === 2 ? langDict.level2Desc : langDict.level3Desc;
                document.getElementById('explanation-stage-desc').innerText = stageDescText;

                // Configure buttons
                for (let i = 1; i <= 3; i++) {
                    const btn = document.getElementById(`stage-tab-${i}`);
                    const isActive = state.currentLevel === i;
                    const stageTitle = i === 1 ? langDict.level1Title : i === 2 ? langDict.level2Title : langDict.level3Title;
                    
                    btn.className = `text-left group cursor-pointer p-4 border transition-all ${
                        isActive ? "bg-neutral-900 border-[#FACC15]" : "bg-neutral-950/40 border-neutral-800 hover:border-[#FACC15]/50"
                    }`;
                    btn.innerHTML = `
                        <div class="h-1 w-full mb-3 transition-all ${isActive ? 'bg-[#FACC15]' : 'bg-neutral-800 group-hover:bg-[#FACC15]/40'}"></div>
                        <div class="flex flex-col">
                            <span class="text-[9px] uppercase tracking-widest mb-1 ${isActive ? 'text-[#FACC15] font-bold' : 'text-neutral-500'}">
                                ${state.lang === 'en' ? 'STAGE' : 'STUFE'} 0${i}
                            </span>
                            <span class="text-xs font-black uppercase tracking-wider ${isActive ? 'text-white' : 'text-neutral-400 group-hover:text-white'}">
                                ${stageTitle}
                            </span>
                        </div>
                    `;
                }

                // Interactive Q&A Area rendering
                document.getElementById('qa-heading').innerText = langDict.questionsHeading;
                document.getElementById('qa-custom-input').placeholder = langDict.inputQAPlaceholder;
                document.getElementById('qa-btn-text').innerText = langDict.btnQAAsk;

                // Free-form Ask CTA clickability
                const qaBtnAsk = document.getElementById('btn-qa-ask');
                qaBtnAsk.disabled = state.isAskingQuestion;

                // Inside explanation's follow-up questions boxes
                const questionsList = state.currentExplanation.questions || [];
                const qaSection = document.getElementById('dynamic-questions');
                if (questionsList.length > 0) {
                    qaSection.classList.remove('hidden');
                    document.getElementById('qa-subheading').innerText = langDict.questionsSubheading;
                    
                    const listButtons = document.getElementById('dynamic-questions-buttons');
                    listButtons.innerHTML = '';
                    
                    questionsList.forEach(q => {
                        const qBtn = document.createElement('button');
                        qBtn.className = "text-left text-xs bg-neutral-950 hover:bg-neutral-900 border border-[#FACC15]/40 hover:border-[#FACC15] px-3 py-2 text-neutral-300 hover:text-[#FACC15] transition-all font-medium flex items-center justify-between group cursor-pointer";
                        qBtn.disabled = state.isAskingQuestion;
                        qBtn.onclick = () => submitQAQuestion(q);
                        qBtn.innerHTML = `
                            <span>${q}</span>
                            <i data-lucide="arrow-right" class="w-3.5 h-3.5 text-[#FACC15]/60 group-hover:text-[#FACC15] transition-colors"></i>
                        `;
                        listButtons.appendChild(qBtn);
                    });
                } else {
                    qaSection.classList.add('hidden');
                }

                // QA Submission loader
                const qaLoader = document.getElementById('qa-loader');
                if (state.isAskingQuestion) {
                    qaLoader.classList.remove('hidden');
                    document.getElementById('qa-loader-text').innerText = langDict.qaAnswerLoading;
                } else {
                    qaLoader.classList.add('hidden');
                }

                // QA Defer error alert boxes
                const qaErrorEl = document.getElementById('qa-error');
                if (state.questionError) {
                    qaErrorEl.classList.remove('hidden');
                    qaErrorEl.innerText = `⚠️ ${state.questionError}`;
                } else {
                    qaErrorEl.classList.add('hidden');
                }

                // QA Active Answer Block rendering
                const answerBlock = document.getElementById('qa-answer-block');
                if (state.activeQuestion && state.questionAnswer && !state.isAskingQuestion) {
                    answerBlock.classList.remove('hidden');
                    document.getElementById('qa-close-btn').innerText = langDict.qaAnswerClose;
                    document.getElementById('qa-tag-label').innerText = langDict.qaAnswerHeader;
                    document.getElementById('qa-active-question-quote').innerText = `"${state.activeQuestion}"`;
                    
                    const ansContentBox = document.getElementById('qa-answer-content');
                    ansContentBox.innerHTML = '';
                    
                    const splitQAAnswers = state.questionAnswer.replace(/\\n/g, '\n').split('\n\n');
                    splitQAAnswers.forEach(pAnswer => {
                        const cleanPTag = pAnswer.trim();
                        if (cleanPTag) {
                            const p = document.createElement('p');
                            p.innerText = cleanPTag;
                            ansContentBox.appendChild(p);
                        }
                    });
                } else {
                    answerBlock.classList.add('hidden');
                }

                // Bottom new search triggers
                document.getElementById('btn-new-search').innerText = langDict.newSearch;

            } else {
                loadingScreen.classList.add('hidden');
                contentScreen.classList.add('hidden');
                onboardingScreen.classList.remove('hidden');

                // Onboarding Default visual guides
                document.getElementById('ready-title').innerText = langDict.readyTitle;
                document.getElementById('ready-desc').innerText = langDict.readyDesc;

                const readyGrid = document.getElementById('ready-showcase-grid');
                readyGrid.innerHTML = `
                    <div class="p-4 bg-neutral-950 border border-neutral-800">
                      <div class="h-1 w-12 bg-[#FACC15] mb-2"></div>
                      <span class="text-[10px] font-mono font-bold text-neutral-500 uppercase tracking-widest block mb-1">
                        STAGE 1
                      </span>
                      <p class="font-black text-xs text-white uppercase tracking-wider">${langDict.level1Title}</p>
                      <p class="text-[10px] text-neutral-400 mt-1">
                        ${state.lang === 'en' ? 'Summary of topic.' : 'Zusammenfassung des Themas.'}
                      </p>
                    </div>
                    <div class="p-4 bg-neutral-950 border border-neutral-800">
                      <div class="h-1 w-12 bg-neutral-700 mb-2"></div>
                      <span class="text-[10px] font-mono font-bold text-neutral-500 uppercase tracking-widest block mb-1">
                        STAGE 2
                      </span>
                      <p class="font-black text-xs text-white uppercase tracking-wider">${langDict.level2Title}</p>
                      <p class="text-[10px] text-neutral-400 mt-1">
                        ${state.lang === 'en' ? 'Focus on the core.' : 'Fokus auf das Kernkonzept.'}
                      </p>
                    </div>
                    <div class="p-4 bg-neutral-950 border border-neutral-800">
                      <div class="h-1 w-12 bg-neutral-700 mb-2"></div>
                      <span class="text-[10px] font-mono font-bold text-neutral-500 uppercase tracking-widest block mb-1">
                        STAGE 3
                      </span>
                      <p class="font-black text-xs text-white uppercase tracking-wider">${langDict.level3Title}</p>
                      <p class="text-[10px] text-neutral-400 mt-1">
                        ${state.lang === 'en' ? 'Analogy or metaphor.' : 'Bildhafte Analogie.'}
                      </p>
                    </div>
                `;
            }

            // 6. Sidebar History ledger render
            document.getElementById('history-box-title').innerText = langDict.historyTitle;
            document.getElementById('history-clear-btn-lbl').innerText = langDict.historyClear;
            
            const btnClearHist = document.getElementById('btn-clear-history');
            if (state.history.length > 0) {
                btnClearHist.classList.remove('hidden');
            } else {
                btnClearHist.classList.add('hidden');
            }

            const historyListControl = document.getElementById('history-list-box');
            historyListControl.innerHTML = '';

            if (state.history.length === 0) {
                historyListControl.innerHTML = `
                    <div class="py-12 text-center text-xs text-neutral-500 flex flex-col items-center select-none">
                      <span class="text-xl mb-1.5 opacity-60">📜</span>
                      <p class="font-bold uppercase tracking-wider text-[10px]">${langDict.historyEmpty}</p>
                      <p class="mt-1 text-center max-w-[200px] text-neutral-600 font-medium">
                        ${langDict.historyEmptyDesc}
                      </p>
                    </div>
                `;
            } else {
                state.history.forEach(item => {
                    const isViewing = state.currentExplanation && state.currentExplanation.topic.toLowerCase() === item.explanations.topic.toLowerCase();
                    const itemNode = document.createElement('div');
                    
                    itemNode.className = `group w-full p-3 text-left transition-all flex items-center justify-between border cursor-pointer ${
                        isViewing
                          ? "bg-neutral-950 border-[#FACC15] text-white"
                          : "bg-neutral-950/40 hover:bg-neutral-950 border-neutral-850 text-neutral-300"
                    }`;
                    itemNode.onclick = () => loadItemFromHistory(item.id);

                    itemNode.innerHTML = `
                      <div class="flex-grow min-w-0 pr-2">
                        <p class="font-black text-xs uppercase tracking-wide truncate ${isViewing ? 'text-[#FACC15]' : 'text-white'}">
                          ${item.keyword}
                        </p>
                        <p class="text-[9px] ${isViewing ? 'text-neutral-400' : 'text-neutral-500'} font-mono uppercase tracking-widest mt-0.5">
                          ⌚ ${item.timestamp}${state.lang === 'de' ? ' Uhr' : ''}
                        </p>
                      </div>
                      <div class="flex items-center space-x-1.5 shrink-0">
                        <button
                          onclick="deleteHistoryItem('${item.id}', event)"
                          class="p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity hover:bg-neutral-850 ${isViewing ? 'text-neutral-400 hover:text-rose-500' : 'text-neutral-500 hover:text-rose-500'}"
                          title="Löschen"
                        >
                          <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                        </button>
                        <i data-lucide="chevron-right" class="w-3.5 h-3.5 ${isViewing ? 'text-[#FACC15]' : 'text-neutral-600'}"></i>
                      </div>
                    `;
                    historyListControl.appendChild(itemNode);
                });
            }

            // Bind pro tip explanations
            document.getElementById('pro-tip-title').innerText = langDict.tipTitle;
            document.getElementById('pro-tip-desc').innerText = langDict.tipDesc;

            // Footer italic active mode indicators
            document.getElementById('context-mode-sub').innerText = state.lang === 'en'
                ? '"Explain like I\'m five" mode active'
                : '"Explain like I\'m five" Modus aktiv';

            // Refresh Lucide graphics vectors
            lucide.createIcons();
        }
    </script>
</body>
</html>
